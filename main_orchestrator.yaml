main:
  steps:
    - init:
        assign:
          - repository: ${"projects/" + sys.get_env("GOOGLE_CLOUD_PROJECT_ID") + "/locations/us-east1/repositories/toolkit-martech-engine"}
    - createCompilation:
        call: http.post
        args:
          url: ${repository + "/compilationResults"}
          auth:
            type: OAuth2
          body:
            releaseConfig: ${repository + "/releaseConfigs/manual-release"}
        result: compilationResult
    - createInvocation:
        call: http.post
        args:
          url: ${repository + "/workflowInvocations"}
          auth:
            type: OAuth2
          body:
            compilationResult: ${compilationResult.body.name}
            invocationConfig:
              includedTags: []
              transitiveDependenciesIncluded: true
        result: invocationResult
    - returnResult:
        return: ${invocationResult.body}